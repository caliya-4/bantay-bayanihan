services:
  - type: web
    name: cbantay-bayanihan
    env: docker
    plan: free
    region: oregon
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bantay-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_SECRET
        generateValue: true
    healthCheckPath: /

databases:
  - name: bantay-db
    databaseName: bantay_bayanihan
    user: bantay_user
    plan: free
    postgresMajorVersion: "15"
    ipAllowList: []
